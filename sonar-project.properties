# SonarCloud configuration (Constitution v1.3.0 quality gate).
# Activation requires (your action):
#   1. Create a SonarCloud project + organization at https://sonarcloud.io
#   2. Set the `SONAR_TOKEN` repository secret (Settings → Secrets → Actions)
#   3. Adjust projectKey/organization below to match your SonarCloud project
# Until SONAR_TOKEN is set, the CI SonarCloud step is skipped (the job stays green).

sonar.projectKey=dylandmr_tcc-engsoft-unicesumar-dylan-rodrigues-52-2026
sonar.organization=dylandmr

sonar.sources=backend/src/main,frontend/src
sonar.tests=backend/src/test,frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*Test.java
sonar.exclusions=frontend/dist/**,**/node_modules/**,**/target/**

# Coverage reports (produced by the backend/frontend jobs)
sonar.java.binaries=backend/target/classes
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
