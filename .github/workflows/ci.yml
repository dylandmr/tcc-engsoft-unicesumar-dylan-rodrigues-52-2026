name: CI

# Quality gate for every PR into develop/main and every feature push (Constitution v1.2.0+).
on:
  push:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend · build, test, coverage gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: mvn verify (tests + JaCoCo 100% gate)
        run: ./mvnw -B --no-transfer-progress verify

  frontend:
    name: Frontend · build, test, coverage gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Test + coverage gate (Vitest 100%)
        run: npm run test:coverage
      - name: Build
        run: npm run build

  semgrep:
    name: Security · Semgrep (SAST/SCA/secrets)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan (Java + TS)
        run: semgrep scan --config p/default --config p/secrets --error --metrics off

  docker:
    name: Docker · image build + smoke test + Trivy scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t prompt-arena:ci .
      - name: Trivy image scan (fail on CRITICAL, fixed)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image --severity CRITICAL --ignore-unfixed \
            --exit-code 1 --no-progress prompt-arena:ci
      - name: Run container
        run: docker run -d --name pa -p 8080:8080 prompt-arena:ci
      - name: Smoke test /api/health
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8080/api/health | grep -q '"status":"ok"'; then
              echo "container healthy"; exit 0
            fi
            sleep 3
          done
          echo "health check failed; container logs:"; docker logs pa; exit 1
      - name: Stop container
        if: always()
        run: docker rm -f pa || true
