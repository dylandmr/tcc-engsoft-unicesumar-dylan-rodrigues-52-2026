spring.application.name=prompt-arena

# Persistence — SQLite (embedded relational). WAL lets readers run concurrently with a writer;
# busy_timeout makes a contended writer wait (up to 5s) instead of failing fast with SQLITE_BUSY
# (T059, verified by SqliteWalConcurrencyTest).
spring.datasource.url=jdbc:sqlite:./data/app.db?journal_mode=WAL&busy_timeout=5000
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
# The SSE fan-out runs in a @Transactional that stays open for the duration of the provider calls,
# so a pool of 1 deadlocks against the request thread's own connection. A small pool gives headroom;
# WAL + busy_timeout keep concurrent writes safe.
spring.datasource.hikari.maximum-pool-size=5
# Release the JDBC connection after each transaction instead of holding it for the whole (async,
# long-lived SSE) request — otherwise the stream request pins the connection the fan-out needs.
spring.jpa.open-in-view=false

# Actuator — health endpoint backs the CI smoke test
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# Comparison tunables (prototype defaults; override via env)
prompt-arena.max-prompt-len=8000
prompt-arena.provider-timeout-ms=45000

# Demo user seeded at startup (US1/US2 auth-for-now; replaced by US3 login)
prompt-arena.demo.username=demo
prompt-arena.demo.password=demo1234
