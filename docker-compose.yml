# Prompt Arena — local prototype. Launch the whole thing with: docker compose up
# Provider keys/models are read from an optional .env file (see .env.example).
# A provider with no key configured surfaces a per-provider error and never breaks the others.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      XAI_MODEL: ${XAI_MODEL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-}
    volumes:
      - ./data:/app/data # persist the SQLite database across restarts
    restart: unless-stopped
